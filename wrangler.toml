# Cloudflare Worker config -- FX Monthly Tracker (native app, no Streamlit).
# `npx wrangler deploy` bundles worker.js + index.html into one worker.
name = "fx-monthly-tracker"
main = "worker.js"
compatibility_date = "2026-07-01"
workers_dev = true

[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true
